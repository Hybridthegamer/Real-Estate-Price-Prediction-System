{% extends "base.html" %}
{% block title %}Admin Login – EstimateNG{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white text-center fw-semibold py-3">
            <i class="bi bi-lock-fill me-2"></i>Admin Login
          </div>
          <div class="card-body p-4">
            <form method="POST" action="{{ url_for('admin_login') }}">
              <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                  placeholder="Enter admin password" autofocus required>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
